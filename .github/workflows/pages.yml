name: Deploy course notes site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-web.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Restore generated asset cache
        uses: actions/cache@v4
        with:
          path: .web-build/.cache
          key: ai-notes-generated-${{ runner.os }}-v2-${{ hashFiles('**/*-notes.tex', '**/*.jpg', '**/*.jpeg', '**/*.png') }}
          restore-keys: |
            ai-notes-generated-${{ runner.os }}-v2-

      - name: Install web dependencies
        run: python -m pip install -r requirements-web.txt

      - name: Check TikZ cache coverage
        id: tikz-cache
        run: |
          if python tools/web/generate_site.py --strict --check-tikz-cache; then
            echo "complete=true" >> "$GITHUB_OUTPUT"
          else
            echo "complete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install TeX tools for TikZ SVG rendering
        if: steps.tikz-cache.outputs.complete != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dvisvgm \
            mupdf-tools \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-pictures \
            texlive-xetex \
            texlive-lang-chinese

      - name: Generate MkDocs workspace
        run: python tools/web/generate_site.py --strict --verbose-warnings --fail-on-tikz-warnings

      - name: Build site
        run: mkdocs build -f .web-build/mkdocs.yml --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .web-build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
